# {{ project_name }} — Python project. Generated from project-template.
# Run `python scripts/init.py` (or `make init`) once to fill in the placeholders.

[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "{{ project_slug }}"
version = "0.1.0"
description = "{{ project_description }}"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "{{ project_license }}" }
authors = [{ name = "{{ project_author }}", email = "{{ project_email }}" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

# T3 is a full WhatsApp-sales SaaS: it carries the AI runtime (T2 inheritance)
# plus everything the API + agent loop + onboarding + security stack needs.
# Heavy deps but all server-side -- no special install steps required.
dependencies = [
    # T2: AI runtime
    "aine-platform @ git+https://github.com/fmonfasani/hookclose@main",
    # API + transport
    "fastapi>=0.110,<1.0",
    "uvicorn[standard]>=0.29,<1.0",
    "pydantic>=2.6,<3.0",
    "pydantic-settings>=2.2,<3.0",
    "httpx>=0.27,<1.0",
    "structlog>=24.1,<25.0",
    # Ingestion (Fase 4 -- multimodal extractors)
    "pypdf>=4.0,<6.0",
    "python-docx>=1.1,<2.0",
    # Security (Fase 13): AES-256-GCM for tokens + rate limiting
    "cryptography>=42,<47",
    "slowapi>=0.1.9,<1.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.4,<1.0",
    "mypy>=1.10,<2.0",
    "pytest>=8.2,<9.0",
    "pytest-asyncio>=0.23,<1.0",
    "pytest-cov>=5.0,<6.0",
]
postgres = ["psycopg[binary]>=3.1,<4.0"]

[project.urls]
Homepage = "{{ project_homepage }}"
Source = "{{ project_homepage }}"
Issues = "{{ project_homepage }}/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/{{ project_slug }}"]

# aine-platform ships as a git dep until it hits PyPI; hatchling refuses direct
# references by default to discourage them — flip the opt-in flag.
[tool.hatch.metadata]
allow-direct-references = true

# -----------------------------------------------------------------------------
# Ruff — formatting + linting in one tool. Match the rule set WhatsApp SaaS proved
# in production: aggressive but with the dead/hostile rules muted.
# -----------------------------------------------------------------------------
[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "services"]
extend-exclude = ["infra", "dashboard", "services/gateway"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "S", "C4", "SIM", "PL", "RUF", "ANN", "ASYNC"]
ignore = [
    "ANN101",   # removed in newer ruff — harmless to list
    "ANN102",   # removed in newer ruff — harmless to list
    "PLR0913",  # too-many-args: false-positive for clean constructor injection
]

[tool.ruff.lint.per-file-ignores]
# Tests get a relaxed annotation/assertion regime so they read like prose.
"tests/**/*.py" = ["S101", "S105", "S106", "ANN", "PLR2004"]
# Package __init__.py files are re-export hubs; F401 fires on every alias.
"**/__init__.py" = ["F401"]
# CLI dispatches subcommands -- many returns is natural and clearer than refactoring.
"src/*/cli.py" = ["PLR0911"]
# SkillResult.ok is a builder helper; **data is intentionally dynamic.
"src/*/skills/base.py" = ["ANN401"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# -----------------------------------------------------------------------------
# mypy — strict from day 1. Loosening later is easier than tightening.
# -----------------------------------------------------------------------------
[tool.mypy]
python_version = "3.11"
mypy_path = "src"
strict = true
warn_unreachable = true
plugins = ["pydantic.mypy"]
exclude = ["^infra/", "^dashboard/", "^services/gateway/"]
# aine-platform's surface isn't fully typed end-to-end yet — let mypy follow
# imports without exploding. Tighten this once HookClose ships proper stubs.
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["runtime.*", "providers.*", "workers.*", "contracts.*"]
ignore_missing_imports = true

# -----------------------------------------------------------------------------
# Pytest
# -----------------------------------------------------------------------------
[tool.pytest.ini_options]
minversion = "8.0"
addopts = ["-ra", "--strict-markers", "--strict-config"]
testpaths = ["tests"]
pythonpath = ["src", "."]
asyncio_mode = "auto"
markers = [
    "unit: pure unit tests (default)",
    "integration: requires external services (real OPENROUTER_API_KEY, postgres, etc.)",
    "smoke: in-process wiring checks",
]

[tool.coverage.run]
branch = true
source = ["{{ project_slug }}"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]

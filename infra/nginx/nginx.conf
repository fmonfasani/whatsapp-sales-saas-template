# Reverse proxy + TLS termination + HSTS for the WhatsApp SaaS API.
#   - certs are mounted from /etc/letsencrypt (certbot on the host)
#   - HTTP listener only serves the ACME http-01 challenge + redirects to HTTPS
#   - upstream is the docker-network `api` service on :8000

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 8192;

events {
    worker_connections  4096;
    multi_accept on;
}

http {
    # Logging + sane buffer / timeout defaults
    log_format  json_combined escape=json
        '{"time":"$time_iso8601","ip":"$remote_addr","method":"$request_method",'
        '"path":"$request_uri","status":$status,"bytes":$body_bytes_sent,'
        '"ms":$request_time,"ua":"$http_user_agent","referer":"$http_referer"}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    sendfile         on;
    tcp_nopush       on;
    tcp_nodelay      on;
    keepalive_timeout 30s;
    types_hash_max_size 4096;

    server_tokens off;  # don't advertise nginx version in headers / error pages
    client_max_body_size 5m;  # WhatsApp media payloads are bounded by Meta

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # Defense in depth: nginx-side rate cap on the webhook even though SlowAPI
    # rate-limits inside the app. 20 r/s per IP, burst 40, drop the rest.
    limit_req_zone $binary_remote_addr zone=webhook_zone:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream waseller_api {
        server api:8000;
        keepalive 32;
    }

    # --- HTTP: redirect-only + ACME http-01 ---
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Certbot writes challenge files here
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Quick health probe for the LB / monitoring before TLS is even set up
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS: the real listener ---
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name ${APP_DOMAIN};

        # Replace ${APP_DOMAIN} below at deploy time (see infra/scripts/bootstrap.sh
        # which renders this file via envsubst). Default cert path matches certbot.
        ssl_certificate     /etc/letsencrypt/live/${APP_DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${APP_DOMAIN}/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/${APP_DOMAIN}/chain.pem;

        # Modern TLS profile (Mozilla intermediate, 2024-09)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        # CSP is API-only; the dashboard ships its own. Lock down everything.
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

        limit_conn conn_zone 20;

        location = /health {
            proxy_pass http://waseller_api/health;
            access_log off;
        }

        location /webhook {
            # Stricter rate cap for the webhook (Meta retries on non-2xx — we
            # absorb their burst here rather than letting it propagate to uvicorn)
            limit_req zone=webhook_zone burst=40 nodelay;
            proxy_pass http://waseller_api/webhook;
            include /etc/nginx/proxy_common.conf;
        }

        location / {
            proxy_pass http://waseller_api;
            include /etc/nginx/proxy_common.conf;
        }
    }
}

name: CI

# T3 verifies the full post-init project end-to-end. The bare template has
# {{ placeholder }} metadata that hatchling refuses to install; we copy into a
# scratch dir, run scripts/init.py with canned answers, then gate everything.
#
# Two jobs run in parallel:
#   - Backend: ruff + mypy --strict + pytest (integration marker excluded)
#   - Dashboard admin: Next.js typecheck + build
#
# Integration tests (real OPENROUTER_API_KEY, real Postgres, etc.) are gated
# behind the `integration` pytest marker and don't run here.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

permissions:
  contents: read

jobs:
  backend:
    name: Backend · Init · Lint · Type · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Initialize the template into a scratch dir
        run: |
          mkdir -p /tmp/init
          cp -r . /tmp/init/proj
          cd /tmp/init/proj
          printf 'CI Sample\nci_sample\nCI smoke project\nCI Bot\nci@example.com\nMIT\nhttps://github.com/example/ci-sample\n' \
              | python scripts/init.py

      - name: Install
        working-directory: /tmp/init/proj
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        working-directory: /tmp/init/proj
        run: |
          ruff check --output-format=github .
          ruff format --check .

      - name: mypy --strict
        working-directory: /tmp/init/proj
        run: mypy src services tests

      - name: pytest
        working-directory: /tmp/init/proj
        run: pytest -m "not integration" -q

  dashboard-admin:
    name: Dashboard admin · Typecheck · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard/admin
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: dashboard/admin/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
